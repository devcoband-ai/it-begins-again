<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>The Band as Living Geometry — Globe</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0e17;
    color: #e2e8f0;
    font-family: 'Georgia', serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
  }
  h1 {
    font-size: 1.4rem;
    font-weight: 300;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #94a3b8;
    margin-bottom: 0.5rem;
  }
  .subtitle {
    font-size: 0.85rem;
    color: #64748b;
    font-style: italic;
    margin-bottom: 1.5rem;
  }
  canvas { display: block; }
  svg { position: absolute; top: 0; left: 0; pointer-events: none; }
  .container { position: relative; }
  .controls {
    position: absolute;
    bottom: 30px;
    display: flex;
    gap: 12px;
  }
  .controls button {
    background: rgba(30, 41, 59, 0.8);
    border: 1px solid #334155;
    color: #94a3b8;
    padding: 8px 16px;
    border-radius: 6px;
    font-family: 'Georgia', serif;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.3s;
  }
  .controls button:hover {
    background: rgba(51, 65, 85, 0.8);
    color: #e2e8f0;
  }
  .controls button.active {
    border-color: #d4a574;
    color: #d4a574;
  }
  .tooltip {
    position: absolute;
    background: rgba(15, 23, 42, 0.95);
    border: 1px solid #334155;
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 13px;
    color: #e2e8f0;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
    max-width: 250px;
    line-height: 1.5;
    z-index: 10;
  }
  .tooltip .name { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
  .tooltip .role { font-style: italic; color: #94a3b8; margin-bottom: 6px; }
  .tooltip .desc { color: #94a3b8; font-size: 12px; }
  .slider-container {
    position: absolute;
    bottom: 80px;
    display: flex;
    align-items: center;
    gap: 12px;
    color: #64748b;
    font-size: 12px;
  }
  .slider-container input[type="range"] {
    width: 200px;
    accent-color: #d4a574;
  }
  .projection-label {
    font-family: 'Georgia', serif;
    font-size: 11px;
    color: #475569;
  }
</style>
</head>
<body>

<h1>The Band as Living Geometry</h1>
<div class="subtitle">Ancient Country Wisdom — five forces, one world</div>

<div class="container" id="container"></div>
<div class="tooltip" id="tooltip"></div>

<div class="slider-container">
  <span class="projection-label">Globe</span>
  <input type="range" id="projection-slider" min="0" max="1" step="0.005" value="0">
  <span class="projection-label">Map</span>
</div>

<div class="controls">
  <button id="btn-breathe" class="active" onclick="setMode('breathe')">Breathe</button>
  <button id="btn-play" onclick="setMode('play')">Play</button>
  <button id="btn-descend" onclick="setMode('descend')">David Descends</button>
  <button id="btn-still" onclick="setMode('still')">Still</button>
  <button id="btn-spin" onclick="setMode('spin')">Spin</button>
</div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://d3js.org/topojson.v3.min.js"></script>
<script>

const width = Math.min(window.innerWidth - 40, 860);
const height = Math.min(window.innerHeight - 200, 640);

const members = [
  {
    id: 'greg', name: 'Greg', role: 'Drums', force: 'Gravity',
    color: '#8b7355',
    desc: 'The center of gravity. Quiet, reserved. Every hit meant something. He made space for everything else.',
    // Sandersville, Georgia area
    lon: -82.98, lat: 32.98,
    mass: 1.5, breathAmp: 2, breathSpeed: 0.3
  },
  {
    id: 'david', name: 'David', role: 'Voice', force: 'Weather',
    color: '#6b8cae',
    desc: 'Moved above it. Descended when the music earned it. The conductor whose baton was his voice.',
    lon: -83.38, lat: 33.95,
    mass: 0.7, breathAmp: 5, breathSpeed: 0.7
  },
  {
    id: 'jeff', name: 'Jeff', role: 'Bass', force: 'Orbit',
    color: '#d4a574',
    desc: 'Found the pocket. Learned to shape within instead of play over. The orbit that gave the center meaning.',
    lon: -82.60, lat: 33.47,
    mass: 1.0, breathAmp: 3, breathSpeed: 0.5
  },
  {
    id: 'rich', name: 'Rich', role: 'Guitar', force: 'Bridge',
    color: '#7a9a7e',
    desc: 'The shy troubadour. Dylan philosopher. The invitation that brought the fifth point to the geometry.',
    lon: -83.70, lat: 32.60,
    mass: 0.9, breathAmp: 2.5, breathSpeed: 0.4
  },
  {
    id: 'noah', name: 'Noah', role: 'Lead Guitar', force: 'Tension',
    color: '#a07e9e',
    desc: 'Cheap gear, quiet presence. The counterpoint that created tension the music needed to resolve.',
    lon: -83.10, lat: 33.40,
    mass: 0.8, breathAmp: 3.5, breathSpeed: 0.6
  }
];

// Store base coordinates
members.forEach(m => {
  m.baseLon = m.lon;
  m.baseLat = m.lat;
});

const container = document.getElementById('container');
const canvas = document.createElement('canvas');
canvas.width = width;
canvas.height = height;
container.appendChild(canvas);
const ctx = canvas.getContext('2d');

const svg = d3.select(container).append('svg')
  .attr('width', width)
  .attr('height', height)
  .style('pointer-events', 'all');

// Projections
const orthoProjection = d3.geoOrthographic()
  .scale(Math.min(width, height) * 0.4)
  .translate([width / 2, height / 2])
  .rotate([83, -33, 0])  // Center on Georgia
  .clipAngle(90);

const equiProjection = d3.geoEquirectangular()
  .scale(Math.min(width, height) * 0.8)
  .translate([width / 2, height / 2])
  .center([-83, 33]);  // Center on Georgia

// Interpolated projection
let projectionT = 0;

function interpolateProjection(lon, lat, t) {
  const ortho = orthoProjection([lon, lat]);
  const equi = equiProjection([lon, lat]);
  
  if (!ortho || !equi) return null;
  
  // Check if point is on visible side for orthographic
  const r = orthoProjection.rotate();
  const c = d3.geoDistance([lon, lat], [-r[0], -r[1]]);
  const isVisible = c < Math.PI / 2;
  
  // Blend clip angle effect
  if (!isVisible && t < 0.5) {
    // Fade out points on far side during ortho-dominant phase
    return { x: ortho[0], y: ortho[1], opacity: Math.max(0, (t - 0.3) / 0.2) };
  }
  
  const x = ortho[0] * (1 - t) + equi[0] * t;
  const y = ortho[1] * (1 - t) + equi[1] * t;
  
  return { x, y, opacity: 1 };
}

// Load world data
let worldData = null;

d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/land-110m.json').then(world => {
  worldData = topojson.feature(world, world.objects.land);
}).catch(() => {
  // Fallback: draw without world outline
  worldData = null;
});

let mode = 'breathe';
let t = 0;
let rotationAngle = 83; // Start centered on Georgia

const slider = document.getElementById('projection-slider');
slider.addEventListener('input', () => {
  projectionT = parseFloat(slider.value);
});

function setMode(m) {
  mode = m;
  document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
  document.getElementById(`btn-${m}`).classList.add('active');
}

// Create SVG overlay elements for interactivity
const nodeGroups = svg.selectAll('.node-group')
  .data(members)
  .enter().append('g')
  .attr('class', 'node-group')
  .style('cursor', 'pointer')
  .style('pointer-events', 'all');

nodeGroups.append('circle')
  .attr('r', 20)
  .attr('fill', 'transparent');

const tooltip = document.getElementById('tooltip');

nodeGroups
  .on('mouseover', (event, d) => {
    tooltip.innerHTML = `
      <div class="name" style="color:${d.color}">${d.name}</div>
      <div class="role">${d.role} — ${d.force}</div>
      <div class="desc">${d.desc}</div>
    `;
    tooltip.style.left = (event.pageX + 15) + 'px';
    tooltip.style.top = (event.pageY - 10) + 'px';
    tooltip.style.opacity = 1;
    d.hovered = true;
  })
  .on('mouseout', (event, d) => {
    tooltip.style.opacity = 0;
    d.hovered = false;
  });

// Drag to rotate (orthographic)
let isDragging = false;
let dragStart = null;
let rotateStart = null;

canvas.addEventListener('mousedown', (e) => {
  isDragging = true;
  dragStart = [e.clientX, e.clientY];
  rotateStart = orthoProjection.rotate();
});

window.addEventListener('mousemove', (e) => {
  if (!isDragging) return;
  const dx = e.clientX - dragStart[0];
  const dy = e.clientY - dragStart[1];
  const sensitivity = 0.3;
  orthoProjection.rotate([
    rotateStart[0] - dx * sensitivity,
    Math.max(-89, Math.min(89, rotateStart[1] + dy * sensitivity)),
    0
  ]);
});

window.addEventListener('mouseup', () => {
  isDragging = false;
});

function drawGraticule(t) {
  const graticule = d3.geoGraticule10();
  ctx.beginPath();
  ctx.strokeStyle = `rgba(30, 41, 59, ${0.3 + t * 0.2})`;
  ctx.lineWidth = 0.5;
  
  // Draw using interpolated path
  const orthoPath = d3.geoPath(orthoProjection, ctx);
  const equiPath = d3.geoPath(equiProjection, ctx);
  
  if (t < 0.01) {
    orthoPath(graticule);
  } else if (t > 0.99) {
    equiPath(graticule);
  } else {
    // Simplified: just use ortho with expanded clip
    const tempProjection = d3.geoOrthographic()
      .scale(orthoProjection.scale() * (1 - t) + equiProjection.scale() * t)
      .translate([width / 2, height / 2])
      .rotate(orthoProjection.rotate())
      .clipAngle(90 + t * 90);
    d3.geoPath(tempProjection, ctx)(graticule);
  }
  ctx.stroke();
}

function drawWorld(t) {
  if (!worldData) return;
  
  ctx.beginPath();
  ctx.fillStyle = `rgba(20, 30, 48, ${0.6 + t * 0.2})`;
  ctx.strokeStyle = `rgba(51, 65, 85, ${0.3 + t * 0.2})`;
  ctx.lineWidth = 0.5;
  
  if (t < 0.01) {
    const path = d3.geoPath(orthoProjection, ctx);
    path(worldData);
  } else if (t > 0.99) {
    const path = d3.geoPath(equiProjection, ctx);
    path(worldData);
  } else {
    const tempProjection = d3.geoOrthographic()
      .scale(orthoProjection.scale() * (1 - t) + equiProjection.scale() * t)
      .translate([width / 2, height / 2])
      .rotate(orthoProjection.rotate())
      .clipAngle(90 + t * 90);
    d3.geoPath(tempProjection, ctx)(worldData);
  }
  ctx.fill();
  ctx.stroke();
}

function drawGlobe(t) {
  if (t > 0.95) return;
  // Draw globe outline for orthographic
  ctx.beginPath();
  ctx.arc(width / 2, height / 2, orthoProjection.scale() * (1 - t), 0, 2 * Math.PI);
  ctx.strokeStyle = `rgba(51, 65, 85, ${0.4 * (1 - t)})`;
  ctx.lineWidth = 1;
  ctx.stroke();
}

function animate() {
  t += 0.016;
  ctx.clearRect(0, 0, width, height);
  
  // Spin mode
  if (mode === 'spin') {
    rotationAngle -= 0.3;
    orthoProjection.rotate([rotationAngle, -33, 0]);
  }
  
  // Animate member positions
  members.forEach((m, i) => {
    if (mode === 'breathe') {
      m.lon = m.baseLon + Math.sin(t * m.breathSpeed * 2) * m.breathAmp;
      m.lat = m.baseLat + Math.cos(t * m.breathSpeed * 1.7) * m.breathAmp * 0.5;
    } else if (mode === 'play') {
      m.lon = m.baseLon + Math.sin(t * m.breathSpeed * 3 + i) * m.breathAmp * 2;
      m.lat = m.baseLat + Math.cos(t * m.breathSpeed * 2.3 + i * 0.7) * m.breathAmp * 1.5;
    } else if (mode === 'descend') {
      const centerLon = d3.mean(members, d => d.baseLon);
      const centerLat = d3.mean(members, d => d.baseLat);
      if (m.id === 'david') {
        const descent = Math.sin(t * 0.5) * 0.5 + 0.5;
        m.lon = m.baseLon + (centerLon - m.baseLon) * descent * 0.6;
        m.lat = m.baseLat + (centerLat - m.baseLat) * descent * 0.6;
      } else if (m.id === 'greg') {
        m.lon = m.baseLon;
        m.lat = m.baseLat;
      } else {
        const pull = Math.sin(t * 0.5) * 0.5 + 0.5;
        m.lon = m.baseLon + Math.sin(t * m.breathSpeed * 2) * m.breathAmp * (1 - pull * 0.3);
        m.lat = m.baseLat + Math.cos(t * m.breathSpeed * 1.7) * m.breathAmp * 0.5 * (1 - pull * 0.3);
      }
    } else if (mode === 'still') {
      m.lon += (m.baseLon - m.lon) * 0.05;
      m.lat += (m.baseLat - m.lat) * 0.05;
    } else if (mode === 'spin') {
      m.lon = m.baseLon + Math.sin(t * m.breathSpeed) * m.breathAmp * 0.5;
      m.lat = m.baseLat + Math.cos(t * m.breathSpeed * 0.7) * m.breathAmp * 0.3;
    }
  });
  
  // Draw globe outline
  drawGlobe(projectionT);
  
  // Draw world
  drawWorld(projectionT);
  
  // Draw graticule
  drawGraticule(projectionT);
  
  // Draw connections on canvas
  for (let i = 0; i < members.length; i++) {
    for (let j = i + 1; j < members.length; j++) {
      const a = interpolateProjection(members[i].lon, members[i].lat, projectionT);
      const b = interpolateProjection(members[j].lon, members[j].lat, projectionT);
      if (a && b && a.opacity > 0 && b.opacity > 0) {
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        const c1 = d3.color(members[i].color);
        const c2 = d3.color(members[j].color);
        const mid = d3.interpolateRgb(c1, c2)(0.5);
        ctx.strokeStyle = mid;
        ctx.globalAlpha = 0.15 * Math.min(a.opacity, b.opacity);
        ctx.lineWidth = 1;
        ctx.stroke();
        ctx.globalAlpha = 1;
      }
    }
  }
  
  // Draw pentagon outline
  ctx.beginPath();
  members.forEach((m, i) => {
    const p = interpolateProjection(m.lon, m.lat, projectionT);
    if (p && p.opacity > 0) {
      if (i === 0) ctx.moveTo(p.x, p.y);
      else ctx.lineTo(p.x, p.y);
    }
  });
  ctx.closePath();
  ctx.strokeStyle = 'rgba(30, 41, 59, 0.4)';
  ctx.lineWidth = 0.5;
  ctx.setLineDash([4, 4]);
  ctx.stroke();
  ctx.setLineDash([]);
  
  // Draw nodes
  members.forEach(m => {
    const p = interpolateProjection(m.lon, m.lat, projectionT);
    if (!p) return;
    
    const alpha = p.opacity;
    if (alpha <= 0) return;
    
    // Glow
    ctx.beginPath();
    const glowRadius = 20 + m.mass * 10;
    const gradient = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, glowRadius);
    gradient.addColorStop(0, d3.color(m.color).copy({opacity: (m.hovered ? 0.4 : 0.15) * alpha}).toString());
    gradient.addColorStop(1, d3.color(m.color).copy({opacity: 0}).toString());
    ctx.fillStyle = gradient;
    ctx.arc(p.x, p.y, glowRadius, 0, 2 * Math.PI);
    ctx.fill();
    
    // Main dot
    ctx.beginPath();
    ctx.arc(p.x, p.y, 6 + m.mass * 4, 0, 2 * Math.PI);
    ctx.fillStyle = d3.color(m.color).copy({opacity: 0.9 * alpha}).toString();
    ctx.fill();
    
    // Labels
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#cbd5e1';
    ctx.font = '13px Georgia';
    ctx.textAlign = 'center';
    ctx.fillText(m.name, p.x, p.y - (16 + m.mass * 6));
    
    ctx.fillStyle = '#64748b';
    ctx.font = 'italic 10px Georgia';
    ctx.fillText(m.role, p.x, p.y + 22 + m.mass * 6);
    
    ctx.fillStyle = '#475569';
    ctx.font = '10px Georgia';
    ctx.fillText(m.force, p.x, p.y + 36 + m.mass * 6);
    ctx.globalAlpha = 1;
  });
  
  // Update SVG hit targets
  nodeGroups.each(function(d) {
    const p = interpolateProjection(d.lon, d.lat, projectionT);
    if (p && p.opacity > 0) {
      d3.select(this)
        .attr('transform', `translate(${p.x},${p.y})`)
        .style('display', 'block');
    } else {
      d3.select(this).style('display', 'none');
    }
  });
  
  requestAnimationFrame(animate);
}

animate();
</script>
</body>
</html>
