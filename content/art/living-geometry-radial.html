<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>The Pentad — Bennett's Sacred Geometry</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0e17;
    color: #e2e8f0;
    font-family: 'Georgia', serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
  }
  h1 {
    font-size: 1.4rem;
    font-weight: 300;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #94a3b8;
    margin-bottom: 0.3rem;
  }
  .subtitle {
    font-size: 0.85rem;
    color: #64748b;
    font-style: italic;
    margin-bottom: 0.5rem;
  }
  .epigraph {
    font-size: 0.72rem;
    color: #475569;
    font-style: italic;
    margin-bottom: 1.2rem;
    max-width: 460px;
    text-align: center;
    line-height: 1.6;
  }
  .tooltip {
    position: absolute;
    background: rgba(15, 23, 42, 0.95);
    border: 1px solid #334155;
    border-radius: 8px;
    padding: 14px 18px;
    font-size: 13px;
    color: #e2e8f0;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
    max-width: 300px;
    line-height: 1.6;
    z-index: 10;
  }
  .tooltip .name { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
  .tooltip .bennett-role { font-style: italic; color: #94a3b8; margin-bottom: 6px; font-size: 12px; }
  .tooltip .insight { font-size: 11px; color: #64748b; margin-top: 6px; }
</style>
</head>
<body>

<h1>The Pentad</h1>
<div class="subtitle">Five terms, one emergent significance</div>
<div class="epigraph">"The pentad is the first system in which the unique character of the monad in question comes into view."<br>— J.G. Bennett</div>

<svg id="chart"></svg>
<div class="tooltip" id="tooltip"></div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script>

const width = Math.min(window.innerWidth - 20, 860);
const height = Math.min(window.innerHeight - 170, 680);
const radius = Math.min(width, height) / 2 - 10;

const memberColors = {
  'Greg': '#8b7355',
  'David': '#6b8cae',
  'Jeff': '#d4a574',
  'Rich': '#7a9a7e',
  'Noah': '#a07e9e'
};

const memberMeta = {
  'Greg':  { term: 'Ground', desc: 'The foundation. Sandersville incarnate. The ground doesn\'t need to move.', insight: 'Every hit meant something. He made space for everything else to exist.' },
  'David': { term: 'Goal', desc: 'The aim toward which the system moves. Purpose made audible.', insight: 'Called after fifteen years. The goal doesn\'t disappear. It waits.' },
  'Jeff':  { term: 'Instrument', desc: 'The means by which ground reaches goal. The channel, not the source.', insight: 'Found the pocket Greg made. The instrument shapes. It doesn\'t create.' },
  'Rich':  { term: 'Limit', desc: 'The constraint that gives the system form. Without limit, potential dissipates.', insight: 'The invitation that made the pentagon possible. Limit is not restriction. It is shape.' },
  'Noah':  { term: 'Direction', desc: 'The orienting force. Tension that tells the system which way to resolve.', insight: 'Counterpoint requires knowing where the melody is going. Direction is knowing.' }
};

const levelColors = {
  'Significance': '#a07e9e',
  'Activity': '#6b8cae',
  'Relationship': '#7a9a7e',
  'Polarity': '#d4a574',
  'Wholeness': '#c75c5c'
};

// Hierarchical data — Bennett's levels branching to members
const data = {
  name: "Significance",
  bennettNumber: "Pentad",
  desc: "The emergent meaning. Only possible when all five terms are present.",
  children: [
    {
      name: "Activity",
      bennettNumber: "Tetrad",
      desc: "Directed energy. The capacity for purposeful motion.",
      children: [
        {
          name: "Relationship",
          bennettNumber: "Triad",
          desc: "Active connection. The quality that binds.",
          children: [
            {
              name: "Polarity",
              bennettNumber: "Dyad",
              desc: "Complementarity. What you are and what you are not.",
              children: [
                { name: "Greg", bennettNumber: "Monad", desc: "Wholeness. Complete in himself." },
                { name: "Rich", bennettNumber: "Monad", desc: "Wholeness. The quiet center of invitation." }
              ]
            },
            {
              name: "Polarity",
              bennettNumber: "Dyad",
              desc: "Complementarity. Tension and resolution.",
              children: [
                { name: "Noah", bennettNumber: "Monad", desc: "Wholeness. Counterpoint as presence." },
                { name: "Jeff", bennettNumber: "Monad", desc: "Wholeness. The orbit that found its pocket." }
              ]
            }
          ]
        },
        { name: "David", bennettNumber: "Monad", desc: "Wholeness. The voice that descends when the music earns it." }
      ]
    }
  ]
};

const svg = d3.select('#chart')
  .attr('width', width)
  .attr('height', height)
  .append('g')
  .attr('transform', `translate(${width/2},${height/2})`);

// Create cluster layout — radial dendrogram
const tree = d3.cluster()
  .size([360, radius * 0.75])
  .separation((a, b) => (a.parent === b.parent ? 1 : 1.5));

const root = d3.hierarchy(data);
tree(root);

const tooltip = document.getElementById('tooltip');

// Draw links — organic curved connections
svg.selectAll('.link')
  .data(root.links())
  .enter().append('path')
  .attr('class', 'link')
  .attr('fill', 'none')
  .attr('stroke', d => {
    const targetName = d.target.data.name;
    if (memberColors[targetName]) return memberColors[targetName];
    if (levelColors[targetName]) return levelColors[targetName];
    return '#334155';
  })
  .attr('stroke-width', d => {
    // Thicker near root, thinner at leaves
    return Math.max(0.5, 3 - d.target.depth * 0.6);
  })
  .attr('stroke-opacity', d => 0.25 + (1 - d.target.depth / 4) * 0.25)
  .attr('d', d => {
    const sourceAngle = (d.source.x - 90) * Math.PI / 180;
    const targetAngle = (d.target.x - 90) * Math.PI / 180;
    const sourceRadius = d.source.y;
    const targetRadius = d.target.y;
    
    const sx = Math.cos(sourceAngle) * sourceRadius;
    const sy = Math.sin(sourceAngle) * sourceRadius;
    const tx = Math.cos(targetAngle) * targetRadius;
    const ty = Math.sin(targetAngle) * targetRadius;
    
    // Curved link
    const midR = (sourceRadius + targetRadius) / 2;
    const midAngle = (sourceAngle + targetAngle) / 2;
    const mx = Math.cos(midAngle) * midR;
    const my = Math.sin(midAngle) * midR;
    
    return `M${sx},${sy} Q${mx},${my} ${tx},${ty}`;
  });

// Draw nodes
const nodes = svg.selectAll('.node')
  .data(root.descendants())
  .enter().append('g')
  .attr('class', 'node')
  .attr('transform', d => {
    const angle = (d.x - 90) * Math.PI / 180;
    const x = Math.cos(angle) * d.y;
    const y = Math.sin(angle) * d.y;
    return `translate(${x},${y})`;
  });

// Node circles
nodes.append('circle')
  .attr('r', d => {
    if (d.depth === 0) return 12; // Root — significance
    if (memberColors[d.data.name]) return 8; // Members
    return 5; // Bennett levels
  })
  .attr('fill', d => {
    if (memberColors[d.data.name]) return memberColors[d.data.name];
    if (levelColors[d.data.name]) return levelColors[d.data.name];
    return '#334155';
  })
  .attr('opacity', d => d.depth === 0 ? 0.9 : 0.7)
  .attr('stroke', d => {
    if (d.depth === 0) return '#a07e9e';
    return 'none';
  })
  .attr('stroke-width', d => d.depth === 0 ? 1.5 : 0)
  .attr('stroke-opacity', 0.4)
  .style('cursor', 'pointer');

// Glow on member nodes
nodes.filter(d => memberColors[d.data.name])
  .insert('circle', ':first-child')
  .attr('r', 20)
  .attr('fill', d => memberColors[d.data.name])
  .attr('opacity', 0.08);

// Labels
nodes.append('text')
  .attr('font-family', 'Georgia')
  .attr('font-size', d => {
    if (d.depth === 0) return '0px'; // handled separately
    if (memberColors[d.data.name]) return '13px';
    return '9px';
  })
  .attr('fill', d => {
    if (memberColors[d.data.name]) return memberColors[d.data.name];
    if (levelColors[d.data.name]) return levelColors[d.data.name];
    return '#64748b';
  })
  .attr('font-weight', d => memberColors[d.data.name] ? '600' : '400')
  .attr('font-style', d => memberColors[d.data.name] ? 'normal' : 'italic')
  .attr('text-anchor', d => {
    const angle = d.x;
    return angle > 180 ? 'end' : 'start';
  })
  .attr('dx', d => {
    if (d.depth === 0) return 0;
    const angle = d.x;
    const offset = memberColors[d.data.name] ? 14 : 10;
    return angle > 180 ? -offset : offset;
  })
  .attr('dy', '0.35em')
  .attr('transform', d => {
    if (d.depth === 0) return '';
    const angle = d.x;
    return angle > 180 ? `rotate(${d.x - 270})` : `rotate(${d.x - 90})`;
  })
  .text(d => {
    if (d.depth === 0) return '';
    if (memberColors[d.data.name]) {
      const meta = memberMeta[d.data.name];
      return `${d.data.name} — ${meta.term}`;
    }
    return d.data.name;
  });

// Bennett term sublabels for members
nodes.filter(d => memberColors[d.data.name])
  .append('text')
  .attr('font-family', 'Georgia')
  .attr('font-size', '9px')
  .attr('fill', '#475569')
  .attr('font-style', 'italic')
  .attr('text-anchor', d => d.x > 180 ? 'end' : 'start')
  .attr('dx', d => {
    const offset = 14;
    return d.x > 180 ? -offset : offset;
  })
  .attr('dy', '1.8em')
  .attr('transform', d => d.x > 180 ? `rotate(${d.x - 270})` : `rotate(${d.x - 90})`)
  .text(d => memberMeta[d.data.name].desc.split('.')[0]);

// Tooltip on hover
nodes
  .on('mouseover', (event, d) => {
    const meta = memberMeta[d.data.name];
    if (meta) {
      tooltip.innerHTML = `
        <div class="name" style="color:${memberColors[d.data.name]}">${d.data.name}</div>
        <div class="bennett-role">${meta.term} — ${meta.desc}</div>
        <div class="insight">${meta.insight}</div>
      `;
    } else {
      tooltip.innerHTML = `
        <div class="name" style="color:${levelColors[d.data.name] || '#94a3b8'}">${d.data.name}</div>
        <div class="bennett-role">${d.data.bennettNumber}</div>
        <div class="insight">${d.data.desc}</div>
      `;
    }
    tooltip.style.left = (event.pageX + 15) + 'px';
    tooltip.style.top = (event.pageY - 10) + 'px';
    tooltip.style.opacity = 1;
  })
  .on('mouseout', () => {
    tooltip.style.opacity = 0;
  });

// Center label — root
svg.append('text')
  .attr('text-anchor', 'middle')
  .attr('dy', '-0.5em')
  .attr('fill', '#94a3b8')
  .attr('font-size', '11px')
  .attr('font-family', 'Georgia')
  .attr('letter-spacing', '0.12em')
  .attr('font-weight', '600')
  .text('SIGNIFICANCE');

svg.append('text')
  .attr('text-anchor', 'middle')
  .attr('dy', '1em')
  .attr('fill', '#475569')
  .attr('font-size', '8px')
  .attr('font-family', 'Georgia')
  .attr('font-style', 'italic')
  .text('the emergent property');

// Subtle pulse
const pulse = svg.append('circle')
  .attr('r', 12)
  .attr('fill', 'none')
  .attr('stroke', '#a07e9e')
  .attr('stroke-width', 0.5)
  .attr('opacity', 0);

function doPulse() {
  pulse
    .attr('r', 12)
    .attr('opacity', 0.3)
    .transition()
    .duration(4000)
    .ease(d3.easeCubicOut)
    .attr('r', radius * 0.3)
    .attr('opacity', 0)
    .on('end', () => setTimeout(doPulse, 3000));
}
doPulse();

// Draw faint sacred geometry — phi spiral suggestion
const goldenAngle = Math.PI * (3 - Math.sqrt(5));
for (let i = 0; i < 60; i++) {
  const angle = i * goldenAngle;
  const r = Math.sqrt(i) * (radius / Math.sqrt(60)) * 0.4;
  svg.append('circle')
    .attr('cx', Math.cos(angle) * r)
    .attr('cy', Math.sin(angle) * r)
    .attr('r', 0.8)
    .attr('fill', '#1e293b')
    .attr('opacity', 0.3);
}

</script>
</body>
</html>
