<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>The Pentad — Bennett's Sacred Geometry</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0e17;
    color: #e2e8f0;
    font-family: 'Georgia', serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
  }
  h1 {
    font-size: 1.4rem;
    font-weight: 300;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #94a3b8;
    margin-bottom: 0.3rem;
  }
  .subtitle {
    font-size: 0.85rem;
    color: #64748b;
    font-style: italic;
    margin-bottom: 1rem;
  }
  .epigraph {
    font-size: 0.75rem;
    color: #475569;
    font-style: italic;
    margin-bottom: 1.5rem;
    max-width: 500px;
    text-align: center;
    line-height: 1.6;
  }
  .tooltip {
    position: absolute;
    background: rgba(15, 23, 42, 0.95);
    border: 1px solid #334155;
    border-radius: 8px;
    padding: 14px 18px;
    font-size: 13px;
    color: #e2e8f0;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
    max-width: 300px;
    line-height: 1.6;
    z-index: 10;
  }
  .tooltip .name { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
  .tooltip .bennett-role { font-style: italic; color: #94a3b8; margin-bottom: 8px; font-size: 12px; }
  .tooltip .dim { font-size: 12px; color: #94a3b8; margin-top: 3px; }
  .tooltip .dim span { color: #cbd5e1; }
  .tooltip .insight { font-size: 11px; color: #64748b; margin-top: 10px; border-top: 1px solid #1e293b; padding-top: 8px; }
  .legend {
    position: absolute;
    bottom: 20px;
    display: flex;
    gap: 18px;
    font-size: 10px;
    color: #64748b;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 700px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .legend-swatch {
    width: 10px;
    height: 10px;
    border-radius: 2px;
    opacity: 0.7;
  }
</style>
</head>
<body>

<h1>The Pentad</h1>
<div class="subtitle">Five terms, one emergent significance</div>
<div class="epigraph">"The pentad is the first system in which the unique character of the monad in question comes into view."<br>— J.G. Bennett, <em>The Dramatic Universe</em></div>

<svg id="chart"></svg>
<div class="tooltip" id="tooltip"></div>
<div class="legend" id="legend"></div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script>

const width = Math.min(window.innerWidth - 40, 800);
const height = Math.min(window.innerHeight - 200, 640);
const outerRadius = Math.min(width, height) / 2 - 55;
const innerRadius = 45;

const svg = d3.select('#chart')
  .attr('width', width)
  .attr('height', height)
  .append('g')
  .attr('transform', `translate(${width/2},${height/2})`);

// Bennett's system levels as dimensions (the rings)
const levels = [
  {
    id: 'wholeness', name: 'Wholeness', number: 'Monad',
    color: '#c75c5c',
    desc: 'The quality of being complete in oneself. Self-contained presence.'
  },
  {
    id: 'polarity', name: 'Polarity', number: 'Dyad',
    color: '#d4a574',
    desc: 'The capacity for complementarity. What you are and what you are not.'
  },
  {
    id: 'relationship', name: 'Relationship', number: 'Triad',
    color: '#7a9a7e',
    desc: 'The quality of active connection. How you relate to others.'
  },
  {
    id: 'activity', name: 'Activity', number: 'Tetrad',
    color: '#6b8cae',
    desc: 'The capacity for directed action. Energy in motion.'
  },
  {
    id: 'significance', name: 'Significance', number: 'Pentad',
    color: '#a07e9e',
    desc: 'The emergent meaning. Only possible when all five terms are present.'
  }
];

// Five members mapped to Bennett's pentad terms
const members = [
  {
    name: 'Greg', bennettTerm: 'Ground',
    color: '#8b7355',
    bennettDesc: 'The foundation upon which the system rests. Without ground, nothing holds.',
    insight: 'Greg never moved from Sandersville. The ground doesn\'t need to move. Everything else orbits it.',
    wholeness: 0.95, polarity: 0.30, relationship: 0.65, activity: 0.20, significance: 0.85
  },
  {
    name: 'David', bennettTerm: 'Goal',
    color: '#6b8cae',
    bennettDesc: 'The aim toward which the system moves. Purpose made audible.',
    insight: 'David called after fifteen years. The goal doesn\'t disappear when you stop looking at it. It waits.',
    wholeness: 0.50, polarity: 0.90, relationship: 0.80, activity: 0.85, significance: 0.95
  },
  {
    name: 'Jeff', bennettTerm: 'Instrument',
    color: '#d4a574',
    bennettDesc: 'The means by which ground reaches goal. The channel, not the source.',
    insight: 'Found the pocket Greg made. The instrument doesn\'t create the music. It shapes it.',
    wholeness: 0.60, polarity: 0.55, relationship: 0.75, activity: 0.70, significance: 0.70
  },
  {
    name: 'Rich', bennettTerm: 'Limit',
    color: '#7a9a7e',
    bennettDesc: 'The constraint that gives the system form. Without limit, potential dissipates.',
    insight: 'The invitation that made the pentagon possible. The limit is not a restriction. It is a shape.',
    wholeness: 0.75, polarity: 0.40, relationship: 0.90, activity: 0.30, significance: 0.60
  },
  {
    name: 'Noah', bennettTerm: 'Direction',
    color: '#a07e9e',
    bennettDesc: 'The orienting force. Tension that tells the system which way to resolve.',
    insight: 'Counterpoint requires knowing where the melody is going. Direction is not movement. It is knowing.',
    wholeness: 0.55, polarity: 0.70, relationship: 0.60, activity: 0.65, significance: 0.75
  }
];

const n = members.length;
const angleSlice = (2 * Math.PI) / n;
const levelCount = levels.length;
const ringWidth = (outerRadius - innerRadius) / levelCount;

// Draw concentric ring guides
levels.forEach((level, li) => {
  const r = innerRadius + (li + 1) * ringWidth;
  
  svg.append('circle')
    .attr('r', r)
    .attr('fill', 'none')
    .attr('stroke', '#1e293b')
    .attr('stroke-width', 0.5)
    .attr('stroke-dasharray', li === levelCount - 1 ? 'none' : '2,4');
  
  // Ring label
  const labelAngle = -Math.PI / 2 + angleSlice * 0.05;
  svg.append('text')
    .attr('x', Math.cos(labelAngle) * (r - ringWidth / 2) + 5)
    .attr('y', Math.sin(labelAngle) * (r - ringWidth / 2))
    .attr('fill', level.color)
    .attr('font-size', '8px')
    .attr('font-family', 'Georgia')
    .attr('opacity', 0.5)
    .attr('text-anchor', 'start')
    .text(level.number);
});

// Inner ring
svg.append('circle')
  .attr('r', innerRadius)
  .attr('fill', 'none')
  .attr('stroke', '#1e293b')
  .attr('stroke-width', 0.5);

// Radial dividers
members.forEach((m, i) => {
  const angle = i * angleSlice - Math.PI / 2;
  svg.append('line')
    .attr('x1', Math.cos(angle) * innerRadius)
    .attr('y1', Math.sin(angle) * innerRadius)
    .attr('x2', Math.cos(angle) * (outerRadius + 10))
    .attr('y2', Math.sin(angle) * (outerRadius + 10))
    .attr('stroke', '#1e293b')
    .attr('stroke-width', 0.5);
});

// Draw wedges — each member × each Bennett level
const tooltip = document.getElementById('tooltip');
const barAngleWidth = angleSlice * 0.85;

members.forEach((member, mi) => {
  levels.forEach((level, li) => {
    const value = member[level.id];
    const rInner = innerRadius + li * ringWidth + 1.5;
    const maxHeight = ringWidth - 3;
    
    const wedgeArc = d3.arc()
      .innerRadius(rInner)
      .outerRadius(rInner + maxHeight * value)
      .startAngle(mi * angleSlice - barAngleWidth / 2)
      .endAngle(mi * angleSlice + barAngleWidth / 2)
      .cornerRadius(1.5);
    
    svg.append('path')
      .attr('d', wedgeArc)
      .attr('fill', level.color)
      .attr('opacity', 0.45)
      .attr('stroke', level.color)
      .attr('stroke-width', 0.5)
      .attr('stroke-opacity', 0.2)
      .style('cursor', 'pointer')
      .on('mouseover', function(event) {
        d3.select(this).attr('opacity', 0.8);
        
        // Build all dimensions for this member
        let dims = levels.map(l => 
          `<div class="dim">${l.number} · ${l.name}: <span>${Math.round(member[l.id] * 100)}%</span></div>`
        ).join('');
        
        tooltip.innerHTML = `
          <div class="name" style="color:${member.color}">${member.name}</div>
          <div class="bennett-role">${member.bennettTerm} — "${member.bennettDesc}"</div>
          ${dims}
          <div class="insight">${member.insight}</div>
        `;
        tooltip.style.left = (event.pageX + 15) + 'px';
        tooltip.style.top = (event.pageY - 10) + 'px';
        tooltip.style.opacity = 1;
      })
      .on('mousemove', function(event) {
        tooltip.style.left = (event.pageX + 15) + 'px';
        tooltip.style.top = (event.pageY - 10) + 'px';
      })
      .on('mouseout', function() {
        d3.select(this).attr('opacity', 0.45);
        tooltip.style.opacity = 0;
      });
  });
});

// Member labels (outside)
members.forEach((m, i) => {
  const angle = i * angleSlice - Math.PI / 2;
  const labelR = outerRadius + 32;
  const x = Math.cos(angle) * labelR;
  const y = Math.sin(angle) * labelR;
  
  const g = svg.append('g')
    .attr('transform', `translate(${x},${y})`);
  
  g.append('text')
    .attr('text-anchor', 'middle')
    .attr('fill', m.color)
    .attr('font-size', '14px')
    .attr('font-weight', '600')
    .attr('font-family', 'Georgia')
    .text(m.name);
  
  g.append('text')
    .attr('text-anchor', 'middle')
    .attr('dy', '1.3em')
    .attr('fill', '#475569')
    .attr('font-size', '10px')
    .attr('font-style', 'italic')
    .attr('font-family', 'Georgia')
    .text(m.bennettTerm);
});

// Sacred geometry: pentagram (connect every other point)
const pentagramR = outerRadius * 0.55;
const pentagramPoints = members.map((m, i) => {
  const angle = i * angleSlice - Math.PI / 2;
  return [Math.cos(angle) * pentagramR, Math.sin(angle) * pentagramR];
});

// Pentagram star lines
for (let i = 0; i < 5; i++) {
  const j = (i + 2) % 5;
  svg.append('line')
    .attr('x1', pentagramPoints[i][0])
    .attr('y1', pentagramPoints[i][1])
    .attr('x2', pentagramPoints[j][0])
    .attr('y2', pentagramPoints[j][1])
    .attr('stroke', '#d4a574')
    .attr('stroke-width', 0.6)
    .attr('stroke-opacity', 0.10)
    .attr('stroke-dasharray', '6,8');
}

// Pentagon outline
svg.append('polygon')
  .attr('points', pentagramPoints.map(p => p.join(',')).join(' '))
  .attr('fill', 'none')
  .attr('stroke', '#334155')
  .attr('stroke-width', 0.5)
  .attr('stroke-dasharray', '3,5')
  .attr('opacity', 0.3);

// Small dots at pentagon vertices
pentagramPoints.forEach((p, i) => {
  svg.append('circle')
    .attr('cx', p[0])
    .attr('cy', p[1])
    .attr('r', 2.5)
    .attr('fill', members[i].color)
    .attr('opacity', 0.4);
});

// Center
svg.append('circle')
  .attr('r', innerRadius - 1)
  .attr('fill', 'rgba(10, 14, 23, 0.9)')
  .attr('stroke', '#1e293b')
  .attr('stroke-width', 0.5);

// Center text — the emergent property
svg.append('text')
  .attr('text-anchor', 'middle')
  .attr('dy', '-0.8em')
  .attr('fill', '#64748b')
  .attr('font-size', '8px')
  .attr('font-family', 'Georgia')
  .attr('letter-spacing', '0.15em')
  .text('EMERGENT');

svg.append('text')
  .attr('text-anchor', 'middle')
  .attr('dy', '0.5em')
  .attr('fill', '#94a3b8')
  .attr('font-size', '11px')
  .attr('font-family', 'Georgia')
  .attr('letter-spacing', '0.12em')
  .attr('font-weight', '600')
  .text('SIGNIFICANCE');

svg.append('text')
  .attr('text-anchor', 'middle')
  .attr('dy', '2em')
  .attr('fill', '#475569')
  .attr('font-size', '7px')
  .attr('font-family', 'Georgia')
  .attr('font-style', 'italic')
  .text('only when all five are present');

// Subtle pulse animation on center
const centerPulse = svg.append('circle')
  .attr('r', innerRadius - 1)
  .attr('fill', 'none')
  .attr('stroke', '#a07e9e')
  .attr('stroke-width', 0.5)
  .attr('opacity', 0);

function pulseCenter() {
  centerPulse
    .attr('r', innerRadius - 1)
    .attr('opacity', 0.3)
    .transition()
    .duration(3000)
    .ease(d3.easeCubicOut)
    .attr('r', innerRadius + 20)
    .attr('opacity', 0)
    .on('end', () => setTimeout(pulseCenter, 2000));
}
pulseCenter();

// Legend
const legendEl = document.getElementById('legend');
levels.forEach(level => {
  const item = document.createElement('div');
  item.className = 'legend-item';
  item.innerHTML = `<div class="legend-swatch" style="background:${level.color}"></div>${level.number} · ${level.name}`;
  legendEl.appendChild(item);
});

</script>
</body>
</html>
