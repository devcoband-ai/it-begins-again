<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>The Band as Living Geometry</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0e17;
    color: #e2e8f0;
    font-family: 'Georgia', serif;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
  }
  h1 {
    font-size: 1.4rem;
    font-weight: 300;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #94a3b8;
    margin-bottom: 0.5rem;
  }
  .subtitle {
    font-size: 0.85rem;
    color: #64748b;
    font-style: italic;
    margin-bottom: 2rem;
  }
  svg {
    display: block;
  }
  .member-label {
    font-family: 'Georgia', serif;
    font-size: 13px;
    fill: #cbd5e1;
    text-anchor: middle;
    pointer-events: none;
  }
  .role-label {
    font-family: 'Georgia', serif;
    font-size: 10px;
    fill: #64748b;
    text-anchor: middle;
    font-style: italic;
    pointer-events: none;
  }
  .force-label {
    font-family: 'Georgia', serif;
    font-size: 10px;
    fill: #475569;
    text-anchor: middle;
    pointer-events: none;
  }
  .connection {
    stroke-opacity: 0.15;
    fill: none;
  }
  .node-glow {
    pointer-events: none;
  }
  .tooltip {
    position: absolute;
    background: rgba(15, 23, 42, 0.95);
    border: 1px solid #334155;
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 13px;
    color: #e2e8f0;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
    max-width: 250px;
    line-height: 1.5;
  }
  .tooltip .name { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
  .tooltip .role { font-style: italic; color: #94a3b8; margin-bottom: 6px; }
  .tooltip .desc { color: #94a3b8; font-size: 12px; }
  .controls {
    position: absolute;
    bottom: 30px;
    display: flex;
    gap: 12px;
  }
  .controls button {
    background: rgba(30, 41, 59, 0.8);
    border: 1px solid #334155;
    color: #94a3b8;
    padding: 8px 16px;
    border-radius: 6px;
    font-family: 'Georgia', serif;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.3s;
  }
  .controls button:hover {
    background: rgba(51, 65, 85, 0.8);
    color: #e2e8f0;
  }
  .controls button.active {
    border-color: #d4a574;
    color: #d4a574;
  }
</style>
</head>
<body>

<h1>The Band as Living Geometry</h1>
<div class="subtitle">Ancient Country Wisdom — five forces, one emergent pattern</div>
<svg id="canvas"></svg>
<div class="tooltip" id="tooltip"></div>

<div class="controls">
  <button id="btn-breathe" class="active" onclick="setMode('breathe')">Breathe</button>
  <button id="btn-play" onclick="setMode('play')">Play</button>
  <button id="btn-descend" onclick="setMode('descend')">David Descends</button>
  <button id="btn-still" onclick="setMode('still')">Still</button>
</div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
const width = Math.min(window.innerWidth, 800);
const height = Math.min(window.innerHeight - 160, 700);
const cx = width / 2;
const cy = height / 2;
const baseRadius = Math.min(width, height) * 0.3;

const members = [
  {
    id: 'greg', name: 'Greg', role: 'Drums', force: 'Gravity',
    color: '#8b7355', desc: 'The center of gravity. Quiet, reserved. Every hit meant something. He made space for everything else.',
    angle: -Math.PI / 2, // top-ish but offset
    mass: 1.5, breathAmp: 0.02, breathSpeed: 0.3
  },
  {
    id: 'david', name: 'David', role: 'Voice', force: 'Weather',
    color: '#6b8cae', desc: 'Moved above it. Descended when the music earned it. The conductor whose baton was his voice.',
    angle: -Math.PI / 2 + (2 * Math.PI / 5), 
    mass: 0.7, breathAmp: 0.08, breathSpeed: 0.7
  },
  {
    id: 'jeff', name: 'Jeff', role: 'Bass', force: 'Orbit',
    color: '#d4a574', desc: 'Found the pocket. Learned to shape within instead of play over. The orbit that gave the center meaning.',
    angle: -Math.PI / 2 + (4 * Math.PI / 5),
    mass: 1.0, breathAmp: 0.04, breathSpeed: 0.5
  },
  {
    id: 'rich', name: 'Rich', role: 'Guitar', force: 'Bridge',
    color: '#7a9a7e', desc: 'The shy troubadour. Dylan philosopher. The invitation that brought the fifth point to the geometry.',
    angle: -Math.PI / 2 + (6 * Math.PI / 5),
    mass: 0.9, breathAmp: 0.03, breathSpeed: 0.4
  },
  {
    id: 'noah', name: 'Noah', role: 'Lead Guitar', force: 'Tension',
    color: '#a07e9e', desc: 'Cheap gear, quiet presence. The counterpoint that created tension the music needed to resolve.',
    angle: -Math.PI / 2 + (8 * Math.PI / 5),
    mass: 0.8, breathAmp: 0.05, breathSpeed: 0.6
  }
];

// Set base positions
members.forEach(m => {
  m.baseX = cx + Math.cos(m.angle) * baseRadius;
  m.baseY = cy + Math.sin(m.angle) * baseRadius;
  m.x = m.baseX;
  m.y = m.baseY;
});

const svg = d3.select('#canvas')
  .attr('width', width)
  .attr('height', height);

// Defs for glows
const defs = svg.append('defs');
members.forEach(m => {
  const filter = defs.append('filter').attr('id', `glow-${m.id}`);
  filter.append('feGaussianBlur').attr('stdDeviation', '8').attr('result', 'coloredBlur');
  const merge = filter.append('feMerge');
  merge.append('feMergeNode').attr('in', 'coloredBlur');
  merge.append('feMergeNode').attr('in', 'SourceGraphic');
});

// Connection lines (all pairs)
const connections = [];
for (let i = 0; i < members.length; i++) {
  for (let j = i + 1; j < members.length; j++) {
    connections.push({ source: members[i], target: members[j] });
  }
}

const connectionLines = svg.selectAll('.connection')
  .data(connections)
  .enter().append('line')
  .attr('class', 'connection')
  .attr('stroke', d => {
    const c1 = d3.color(d.source.color);
    const c2 = d3.color(d.target.color);
    return d3.interpolateRgb(c1, c2)(0.5);
  })
  .attr('stroke-width', 1);

// Pentagon outline
const pentagonPath = svg.append('path')
  .attr('fill', 'none')
  .attr('stroke', '#1e293b')
  .attr('stroke-width', 0.5)
  .attr('stroke-dasharray', '4,4');

// Center point (emergent)
const centerDot = svg.append('circle')
  .attr('cx', cx)
  .attr('cy', cy)
  .attr('r', 3)
  .attr('fill', '#334155')
  .attr('opacity', 0.5);

// Center to nodes
const centerLines = svg.selectAll('.center-line')
  .data(members)
  .enter().append('line')
  .attr('stroke', d => d.color)
  .attr('stroke-width', 0.5)
  .attr('stroke-opacity', 0.08)
  .attr('stroke-dasharray', '2,6');

// Node groups
const nodeGroups = svg.selectAll('.node-group')
  .data(members)
  .enter().append('g')
  .attr('class', 'node-group')
  .style('cursor', 'pointer');

// Glow circles
nodeGroups.append('circle')
  .attr('class', 'node-glow')
  .attr('r', d => 20 + d.mass * 10)
  .attr('fill', d => d.color)
  .attr('opacity', 0.1)
  .attr('filter', d => `url(#glow-${d.id})`);

// Main circles
nodeGroups.append('circle')
  .attr('r', d => 6 + d.mass * 4)
  .attr('fill', d => d.color)
  .attr('opacity', 0.9);

// Labels
nodeGroups.append('text')
  .attr('class', 'member-label')
  .attr('dy', d => -(16 + d.mass * 6))
  .text(d => d.name);

nodeGroups.append('text')
  .attr('class', 'role-label')
  .attr('dy', d => 22 + d.mass * 6)
  .text(d => d.role);

nodeGroups.append('text')
  .attr('class', 'force-label')
  .attr('dy', d => 36 + d.mass * 6)
  .text(d => d.force);

// Tooltip
const tooltip = d3.select('#tooltip');

nodeGroups
  .on('mouseover', (event, d) => {
    tooltip.html(`
      <div class="name" style="color:${d.color}">${d.name}</div>
      <div class="role">${d.role} — ${d.force}</div>
      <div class="desc">${d.desc}</div>
    `)
    .style('left', (event.pageX + 15) + 'px')
    .style('top', (event.pageY - 10) + 'px')
    .style('opacity', 1);

    d3.select(event.currentTarget).select('.node-glow')
      .transition().duration(300).attr('opacity', 0.3);
    
    connectionLines.transition().duration(300)
      .attr('stroke-opacity', c => 
        (c.source.id === d.id || c.target.id === d.id) ? 0.4 : 0.05
      );
  })
  .on('mouseout', (event, d) => {
    tooltip.style('opacity', 0);
    d3.select(event.currentTarget).select('.node-glow')
      .transition().duration(300).attr('opacity', 0.1);
    connectionLines.transition().duration(300)
      .attr('stroke-opacity', 0.15);
  });

// Animation
let mode = 'breathe';
let t = 0;

function setMode(m) {
  mode = m;
  document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
  document.getElementById(`btn-${m}`).classList.add('active');
}

function animate() {
  t += 0.016;

  members.forEach((m, i) => {
    let targetX = m.baseX;
    let targetY = m.baseY;

    if (mode === 'breathe') {
      const breathe = 1 + Math.sin(t * m.breathSpeed * 2) * m.breathAmp;
      targetX = cx + (m.baseX - cx) * breathe;
      targetY = cy + (m.baseY - cy) * breathe;
    } else if (mode === 'play') {
      const breathe = 1 + Math.sin(t * m.breathSpeed * 3) * m.breathAmp * 2;
      const drift = Math.sin(t * m.breathSpeed * 1.7 + i) * 15;
      const driftY = Math.cos(t * m.breathSpeed * 2.3 + i * 0.7) * 12;
      targetX = cx + (m.baseX - cx) * breathe + drift;
      targetY = cy + (m.baseY - cy) * breathe + driftY;
    } else if (mode === 'descend') {
      if (m.id === 'david') {
        const descent = Math.sin(t * 0.5) * 0.5 + 0.5; // 0 to 1
        targetX = m.baseX + (cx - m.baseX) * descent * 0.6;
        targetY = m.baseY + (cy - m.baseY) * descent * 0.6;
      } else if (m.id === 'greg') {
        // Greg stays firm
        targetX = m.baseX;
        targetY = m.baseY;
      } else {
        // Others respond — pulled slightly toward center when David descends
        const pull = Math.sin(t * 0.5) * 0.5 + 0.5;
        const breathe = 1 + Math.sin(t * m.breathSpeed * 2) * m.breathAmp;
        targetX = cx + (m.baseX - cx) * breathe * (1 - pull * 0.1);
        targetY = cy + (m.baseY - cy) * breathe * (1 - pull * 0.1);
      }
    } else if (mode === 'still') {
      targetX = m.baseX;
      targetY = m.baseY;
    }

    m.x += (targetX - m.x) * 0.05;
    m.y += (targetY - m.y) * 0.05;
  });

  // Update positions
  nodeGroups.data(members)
    .attr('transform', d => `translate(${d.x},${d.y})`);

  connectionLines
    .attr('x1', d => d.source.x)
    .attr('y1', d => d.source.y)
    .attr('x2', d => d.target.x)
    .attr('y2', d => d.target.y);

  centerLines
    .attr('x1', cx)
    .attr('y1', cy)
    .attr('x2', d => d.x)
    .attr('y2', d => d.y);

  // Update pentagon path
  const pathData = members.map((m, i) => 
    `${i === 0 ? 'M' : 'L'}${m.x},${m.y}`
  ).join(' ') + ' Z';
  pentagonPath.attr('d', pathData);

  // Pulse center based on average distance
  const avgDist = d3.mean(members, m => 
    Math.sqrt((m.x - cx) ** 2 + (m.y - cy) ** 2)
  );
  centerDot.attr('r', 2 + (baseRadius - avgDist) / baseRadius * 6)
    .attr('opacity', 0.3 + (baseRadius - avgDist) / baseRadius * 0.4);

  requestAnimationFrame(animate);
}

animate();
</script>
</body>
</html>
